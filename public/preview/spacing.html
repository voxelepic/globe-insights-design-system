<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 16px; padding: 6px 0; }
  .label { width: 90px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .bar { background: var(--ink); height: 18px; }
  .px { font-size: 12px; opacity: 0.6; margin-left: 8px; }
</style></head>
<body>
  <div class="row"><div class="label">S-1</div><div class="bar" style="width:8px;"></div><div class="px">8</div></div>
  <div class="row"><div class="label">S-2</div><div class="bar" style="width:16px;"></div><div class="px">16</div></div>
  <div class="row"><div class="label">S-3</div><div class="bar" style="width:24px;"></div><div class="px">24</div></div>
  <div class="row"><div class="label">S-4</div><div class="bar" style="width:32px;"></div><div class="px">32</div></div>
  <div class="row"><div class="label">S-5</div><div class="bar" style="width:48px;"></div><div class="px">48</div></div>
  <div class="row"><div class="label">S-6</div><div class="bar" style="width:64px;"></div><div class="px">64</div></div>
  <div class="row"><div class="label">S-7</div><div class="bar" style="width:96px;"></div><div class="px">96</div></div>
  <div class="row"><div class="label">S-8</div><div class="bar" style="width:128px;"></div><div class="px">128</div></div>
</body></html>
