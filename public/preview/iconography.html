<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 36px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 16px; }
  .ico { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ico .glyph { width: 44px; height: 44px; border: var(--border); display: flex; align-items: center; justify-content: center; background: var(--paper); }
  .ico .glyph svg { width: 22px; height: 22px; stroke: var(--ink); fill: none; stroke-width: 2.25; stroke-linecap: round; stroke-linejoin: round; }
  .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; }
  .arrow { font-family: var(--font-mono); font-size: 22px; font-weight: 700; }
</style></head>
<body>
  <div class="grid">
    <div class="ico"><div class="glyph"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg></div><div class="lbl">GLOBE</div></div>
    <div class="ico"><div class="glyph"><svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1L15 22v-1.5L13 19v-5.5z"/></svg></div><div class="lbl">PLANE</div></div>
    <div class="ico"><div class="glyph"><svg viewBox="0 0 24 24"><path d="M3 7h18v12H3z"/><path d="M3 11h18M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div><div class="lbl">CARRY-ON</div></div>
    <div class="ico"><div class="glyph"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div><div class="lbl">CLOCK</div></div>
    <div class="ico"><div class="glyph"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 12-9 12S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div class="lbl">PIN</div></div>
    <div class="ico"><div class="glyph"><span class="arrow">→</span></div><div class="lbl">FWD</div></div>
    <div class="ico"><div class="glyph"><span class="arrow">↗</span></div><div class="lbl">EXTERN</div></div>
    <div class="ico"><div class="glyph"><span class="arrow">✕</span></div><div class="lbl">CLOSE</div></div>
  </div>
</body></html>
