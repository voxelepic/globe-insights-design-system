<!doctype html>
<html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 36px; font-family: var(--font-body); display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .panel h5 { font-family: var(--font-display); font-weight: 900; font-size: 14px; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .row { display: flex; align-items: center; gap: 12px; padding: 6px 0; font-size: 12px; }
  .name { width: 110px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; }
  code { background: var(--ink); color: var(--accent); padding: 2px 6px; font-size: 11px; }
  .curve { width: 60px; height: 30px; }
  .curve path { fill: none; stroke: var(--ink); stroke-width: 2.5; }
</style></head>
<body>
  <div class="panel">
    <h5>EASING</h5>
    <div class="row"><div class="name">EASE-OUT</div>
      <svg class="curve" viewBox="0 0 60 30"><path d="M0 30 C 10 30 20 0 60 0"/></svg>
      <code>0.16, 1, 0.3, 1</code>
    </div>
    <div class="row"><div class="name">SNAP</div>
      <svg class="curve" viewBox="0 0 60 30"><path d="M0 30 C 30 30 45 30 60 0"/></svg>
      <code>0.5, 0, 0.75, 0</code>
    </div>
  </div>
  <div class="panel">
    <h5>DURATIONS</h5>
    <div class="row"><div class="name">HOVER</div>200<span style="opacity:0.5">ms</span></div>
    <div class="row"><div class="name">PRESS</div>80<span style="opacity:0.5">ms</span></div>
    <div class="row"><div class="name">ENTER</div>700<span style="opacity:0.5">ms</span></div>
    <div class="row"><div class="name">PARALLAX</div>900<span style="opacity:0.5">ms · scroll</span></div>
  </div>
</body></html>
