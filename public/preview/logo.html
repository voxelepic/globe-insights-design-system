<!doctype html>
<html><head><meta charset="utf-8"><title>Logo / Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 36px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: center; }
  .lock { display: flex; align-items: center; gap: 14px; }
  .mark {
    width: 56px; height: 56px;
    background: var(--ink);
    border: var(--border);
    position: relative;
    flex: 0 0 56px;
  }
  .mark::before {
    content: ""; position: absolute; inset: 8px;
    border: 3px solid var(--accent);
    border-radius: 50%;
  }
  .mark::after {
    content: ""; position: absolute; left: 50%; top: 8px; bottom: 8px; width: 3px; background: var(--accent); transform: translateX(-50%);
  }
  .wordmark {
    font-family: var(--font-display); font-weight: 900;
    font-size: 28px; line-height: 1; letter-spacing: -0.02em;
    text-transform: lowercase;
  }
  .wordmark .dot { color: var(--ink); background: var(--accent); padding: 0 4px; }
  .yel-bg { background: var(--accent); padding: 24px; border: var(--border); }
  .yel-bg .mark { background: var(--ink); }
</style></head>
<body>
  <div class="lock">
    <div class="mark"></div>
    <div class="wordmark">globe<span class="dot">.</span>insights</div>
  </div>
  <div class="yel-bg">
    <div class="lock">
      <div class="mark"></div>
      <div class="wordmark">globe<span class="dot" style="background: var(--paper)">.</span>insights</div>
    </div>
  </div>
</body></html>
