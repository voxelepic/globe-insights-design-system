<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; }
  .row { display: flex; flex-wrap: wrap; gap: 24px; align-items: center; }
  .btn--hov { background: var(--accent); transform: translate(-2px,-2px); box-shadow: 8px 8px 0 0 var(--ink); }
  .btn--prs { transform: translate(0,0); box-shadow: 0 0 0 0 var(--ink); background: var(--accent-press); }
  .arrow { display: inline-block; transform: translateX(2px); }
</style></head>
<body>
  <div class="row">
    <button class="btn">PLAN MY TRIP <span class="arrow">→</span></button>
    <button class="btn btn--hov">HOVER STATE <span class="arrow">→</span></button>
    <button class="btn btn--prs">PRESSED <span class="arrow">→</span></button>
    <button class="btn btn--primary">BOOK NOW <span class="arrow">→</span></button>
  </div>
</body></html>
