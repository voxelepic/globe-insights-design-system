<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 14px 0; border-bottom: 1px dashed #00000022; }
  .row:last-child { border-bottom: 0; }
  .meta { width: 130px; flex-shrink: 0; opacity: 0.7; }
  .specimen { font-family: var(--font-display); font-weight: 900; line-height: 0.9; letter-spacing: -0.02em; text-transform: uppercase; }
</style></head>
<body>
  <div class="row"><div class="meta">HERO / 80 / 900</div><div class="specimen" style="font-size: 64px;">SHORT TRIPS.</div></div>
  <div class="row"><div class="meta">H1 / 64 / 900</div><div class="specimen" style="font-size: 52px;">LONG MEMORIES.</div></div>
  <div class="row"><div class="meta">H2 / 48 / 900</div><div class="specimen" style="font-size: 40px;">ZERO B.S.</div></div>
  <div class="row"><div class="meta">H3 / 32 / 700</div><div class="specimen" style="font-size: 28px; font-weight: 700;">PLAN MY TRIP</div></div>
</body></html>
