<!doctype html>
<html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 36px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
  .card-demo { box-shadow: var(--drop); padding: 18px; }
  .card-demo h4 { font-size: 22px; }
  .meta { margin-bottom: 8px; }
  .price { font-family: var(--font-display); font-weight: 900; font-size: 28px; }
  .img { height: 60px; background: var(--ink); margin-bottom: 12px; position: relative; overflow: hidden; }
  .img.yel { background: var(--accent); }
  .yel-card { background: var(--accent); }
</style></head>
<body>
  <div class="row">
    <div class="card card-demo card--tilt-l">
      <div class="img"></div>
      <div class="meta">LISBON / 48H</div>
      <div class="price">€420</div>
    </div>
    <div class="card card-demo">
      <div class="meta">PLAN · GI-2401</div>
      <h4>WEEKEND IN PORTO</h4>
      <p style="font-size: 13px; margin-top: 8px;">2 flights · 1 carry-on · Done.</p>
    </div>
    <div class="card card-demo yel-card card--tilt-r">
      <div class="meta">NEW</div>
      <h4>OSLO / 36H</h4>
      <div class="price">€380</div>
    </div>
  </div>
</body></html>
