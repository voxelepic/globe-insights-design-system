<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: end; }
  label { display: flex; flex-direction: column; gap: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
  .input--focus { outline: 3px solid var(--accent); outline-offset: 2px; }
  select.input { appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--ink) 50%), linear-gradient(135deg, var(--ink) 50%, transparent 50%); background-position: calc(100% - 18px) 18px, calc(100% - 12px) 18px; background-size: 6px 6px, 6px 6px; background-repeat: no-repeat; padding-right: 36px; }
</style></head>
<body>
  <div class="grid">
    <label>FROM
      <input class="input" placeholder="Where are you?" value="Berlin">
    </label>
    <label>TO
      <input class="input input--focus" placeholder="Where to?" value="Lisbon">
    </label>
    <label>DEPARTING
      <input class="input" type="text" value="FRI 14 JUN">
    </label>
    <label>BUDGET
      <select class="input"><option>UNDER €500</option></select>
    </label>
  </div>
</body></html>
