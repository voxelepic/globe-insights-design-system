<!doctype html>
<html><head><meta charset="utf-8"><title>Stickers & Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 36px; display: flex; align-items: center; justify-content: center; gap: 36px; flex-wrap: wrap; }
  .sticker.big { width: 90px; height: 90px; border-radius: 50%; padding: 0; flex-direction: column; line-height: 1; transform: rotate(-8deg); font-size: 13px; }
  .sticker.big b { font-size: 20px; font-family: var(--font-display); font-weight: 900; }
  .sticker.sq { transform: rotate(4deg); font-size: 13px; }
  .sticker.bk { background: var(--ink); color: var(--accent); }
</style></head>
<body>
  <div class="sticker big"><b>48H</b><span>TRIP</span></div>
  <div class="sticker sq">€420 ALL IN</div>
  <div class="sticker big bk" style="transform: rotate(6deg);"><b>NEW</b></div>
  <div class="sticker sq" style="background: var(--paper); transform: rotate(-3deg);">1 CARRY-ON</div>
</body></html>
